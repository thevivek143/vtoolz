<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:; media-src 'self' blob: mediastream:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com;">
    <title>Wi-Fi QR Generator - Vibox</title>
    <link rel="canonical" href="https://vibox.app/tools/network/wifi-qr.html">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="description" content="Generate a QR code for your Wi-Fi network. Guests can scan to connect instantly.">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Reusing the QR library from existing tools -->
    <script src="../../js/vendor/qrcode.min.js"></script>
    <style>
        .wifi-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .wifi-card {
            max-width: 600px;
            margin: 0 auto;
        }

        .pw-wrap {
            position: relative;
        }

        .pw-toggle {
            position: absolute;
            right: 10px;
            top: 10px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .wifi-result {
            display: none;
            margin-top: 30px;
            text-align: center;
            background: var(--surface-color);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .qr-box {
            display: inline-block;
        }

        .scan-label {
            margin-top: 15px;
            color: var(--text-color);
            font-weight: bold;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1683164345425180"
        crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="container">
            <a href="../../index.html" class="logo">Vibox</a>
            <nav>
                <ul>
                    <li><a href="index.html">Utilities</a></li>
                    <li><a href="#" class="active">Wi-Fi QR</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container tool-container">
            <div class="wifi-hero">
                <h1><i class="fas fa-wifi"></i> Wi-Fi QR Generator</h1>
                <p class="text-muted">Generate a QR code to let guests connect to your Wi-Fi instantly.</p>
            </div>

            <div class="tool-card wifi-card">
                <div class="form-group">
                    <label>Network Name (SSID)</label>
                    <input type="text" id="ssid" class="form-control" placeholder="MyWiFi">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="password" class="form-control" placeholder="Password">
                        <i class="fas fa-eye pw-toggle" id="toggle-pw"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Encryption</label>
                    <select id="encryption" class="form-control">
                        <option value="WPA">WPA/WPA2/WPA3 (Most Common)</option>
                        <option value="WEP">WEP (Legacy)</option>
                        <option value="nopass">None (Open)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><input type="checkbox" id="hidden"> Hidden Network</label>
                </div>

                <button id="btn-generate" class="btn btn-primary btn-block">Generate QR Code</button>

                <div id="result" class="wifi-result">
                    <div id="qrcode" class="qr-box"></div>
                    <p class="scan-label">Scan to Connect</p>
                    <button id="btn-print" class="btn btn-secondary btn-sm"><i class="fas fa-print"></i> Print</button>
                    <button id="btn-download" class="btn btn-secondary btn-sm"><i class="fas fa-download"></i>
                        Download</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../../js/utility/wifi-qr.js"></script>
</body>

</html>
