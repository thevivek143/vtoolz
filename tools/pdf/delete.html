<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:; media-src 'self' blob: mediastream:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com;">
    <title>Delete PDF Pages - Privacy-First Tools</title>
    <link rel="canonical" href="https://vibox.app/tools/pdf/delete.html">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="description" content="Remove unwanted pages from your PDF document. Select and delete pages privately in your browser.">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .page-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .page-item {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }

        .page-item.selected {
            border-color: #e74c3c;
            /* Red for delete */
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.2);
        }

        .page-item canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .page-number {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .check-mark {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .page-item.selected .check-mark {
            display: flex;
        }

        .check-mark::before {
            content: '?';
        }

        .delete-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .delete-controls {
            display: none;
            margin-top: 20px;
        }

        .warn-center {
            text-align: center;
        }

        .delete-toolbar {
            margin-bottom: 1rem;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .delete-action {
            text-align: center;
            margin-top: 2rem;
        }

        .delete-btn {
            min-width: 200px;
            background-color: #e74c3c;
            border-color: #e74c3c;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1683164345425180"
        crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="container">
            <a href="../../index.html" class="logo">Vibox</a>
            <nav>
                <ul>
                    <li><a href="../pdf/index.html">PDF Tools</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="tool-container" id="tool-container">
            <div class="step-indicator">
                <span class="step active">1. Upload</span>
                <span class="step">2. Select to Delete</span>
                <span class="step">3. Download</span>
            </div>

            <div class="delete-hero">
                <h1>Delete Pages</h1>
                <p class="text-muted">Select the pages you want to REMOVE from the document.</p>
            </div>

            <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Upload PDF file">
                <span class="drop-zone-icon"><i class="fas fa-cloud-arrow-up"></i></span>
                <h3>Drop PDF Here</h3>
                <p class="text-muted">or click to browse</p>
                <input type="file" id="file-input" accept="application/pdf" hidden>
            </div>

            <div id="controls" class="delete-controls">
                <div class="alert alert-warning warn-center">
                    Selected pages will be <strong>permanently deleted</strong>.
                </div>

                <div class="toolbar delete-toolbar">
                    <button id="select-all-btn" class="btn btn-secondary">Select All</button>
                    <button id="deselect-all-btn" class="btn btn-secondary">Deselect All</button>
                </div>

                <div id="page-grid" class="page-grid"></div>

                <div class="action-bar delete-action">
                    <button id="delete-btn" class="btn btn-primary delete-btn">
                        Delete Selected Pages
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/vendor/pdf.min.js"></script>
    <script src="delete.inline.js" type="module"></script>
</body>

</html>
