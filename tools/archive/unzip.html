<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' https:; worker-src 'self' blob:; media-src 'self' blob: mediastream:; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://www.google.com;">
    <title>Unzip Utility - Vibox</title>
    <link rel="canonical" href="https://vibox.app/tools/archive/unzip.html">
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="description" content="Extract files from ZIP archives directly in your browser. No uploads, fully private and offline.">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../js/vendor/jszip.min.js"></script>
    <style>
        .file-list-area {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .extract-btn {
            color: var(--primary-color);
            cursor: pointer;
            background: none;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .extract-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        #drop-zone:hover,
        #drop-zone.dragover {
            border-color: var(--primary-color);
            background: rgba(var(--primary-rgb), 0.05);
        }

        .unzip-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .unzip-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .archive-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .hidden-file-input {
            display: none;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .empty-state {
            text-align: center;
            margin-top: 80px;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1683164345425180"
        crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <div class="container">
            <a href="../../index.html" class="logo">Vibox</a>
            <nav>
                <ul>
                    <li><a href="index.html">Archive Tools</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="tool-container">
            <div class="unzip-hero">
                <h1>Unzip Utility</h1>
                <p class="text-muted">Extract files from Zip archives immediately.</p>
            </div>

            <div class="layout unzip-layout">
                <!-- Input Area -->
                <div class="controls-area">
                    <div id="drop-zone">
                        <i class="fas fa-file-archive archive-icon"></i>
                        <h3 id="drop-text">Drag & Drop Zip Here</h3>
                        <p class="text-muted">or click to browse</p>
                        <input type="file" id="file-input" accept=".zip,application/zip" class="hidden-file-input">
                    </div>
                </div>

                <!-- List Area -->
                <div class="preview-area">
                    <div class="tool-card">
                        <div class="content-header">
                            <h3>Archive Content</h3>
                            <!-- <button class="btn btn-sm btn-primary" id="extract-all-btn" disabled>Extract All</button> -->
                            <!-- Extract all can be complex with blob handling for many files, let's keep it simple for now or implement if easy -->
                        </div>

                        <div id="file-list" class="file-list-area">
                            <p class="text-muted empty-state">No archive loaded.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../../js/archive/unzip-utility.js"></script>
    <script type="module" src="../../js/utils/common.js"></script>
</body>

</html>
